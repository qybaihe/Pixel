name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build unsigned iOS package
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show project
        run: xcodebuild -list -project ClipClashPixel.xcodeproj

      - name: Build app without signing
        run: |
          set -euo pipefail
          xcodebuild \
            -project ClipClashPixel.xcodeproj \
            -scheme ClipClashPixel \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$PWD/build/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find "$PWD/build/DerivedData/Build/Products/Release-iphoneos" -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in build/DerivedData/Build/Products/Release-iphoneos"
            exit 1
          fi
          rm -rf unsigned-ipa Payload
          mkdir -p unsigned-ipa Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry "unsigned-ipa/PixelRoundtable-unsigned.ipa" Payload
          /usr/bin/du -h "unsigned-ipa/PixelRoundtable-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixelRoundtable-unsigned-ipa
          path: unsigned-ipa/PixelRoundtable-unsigned.ipa
          if-no-files-found: error
          retention-days: 14
