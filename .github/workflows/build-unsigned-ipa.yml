name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build unsigned iOS package
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show project
        run: xcodebuild -list -project ClipClashPixel.xcodeproj

      - name: Build app without signing
        run: |
          set -euo pipefail
          xcodebuild \
            -project ClipClashPixel.xcodeproj \
            -scheme ClipClashPixel \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$PWD/build/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$(find "$PWD/build/DerivedData/Build/Products/Release-iphoneos" -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app found in build/DerivedData/Build/Products/Release-iphoneos"
            exit 1
          fi
          rm -rf unsigned-ipa Payload
          mkdir -p unsigned-ipa Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry "unsigned-ipa/PixelRoundtable-unsigned.ipa" Payload
          /usr/bin/du -h "unsigned-ipa/PixelRoundtable-unsigned.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PixelRoundtable-unsigned-ipa
          path: unsigned-ipa/PixelRoundtable-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Publish latest unsigned IPA release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RELEASE_TAG="latest-unsigned-ipa"
          RELEASE_TITLE="像素圆桌 unsigned IPA"
          RELEASE_NOTES="自动构建的未签名 IPA。下载后请使用自己的证书或侧载工具重新签名安装。"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES" \
              --latest
          else
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES" \
              --latest
          fi
          gh release upload "$RELEASE_TAG" \
            "unsigned-ipa/PixelRoundtable-unsigned.ipa" \
            --clobber
